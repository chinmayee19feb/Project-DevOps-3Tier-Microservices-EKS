<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>⚡ {{option_a}} vs {{option_b}} — CLOUD WARS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel='stylesheet' href="{{ url_for('static',filename='stylesheets/style.css') }}" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
  </head>
  <body>

    <script>
      // Auto-detect local port-forward mode
      document.addEventListener('DOMContentLoaded', function() {
        if(window.location.hostname === 'localhost') {
          document.getElementById('result-link').href = 'http://localhost:8081';
        }
      });
    </script>
    <!-- Animated background grid -->
    <div class="cyber-grid"></div>
    <div class="scanline"></div>

    <!-- Floating particles -->
    <div class="particles">
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
    </div>

    <div id="content-container">
      <div id="content-container-center">

        <div class="title-section">
          <div class="glitch-text" data-text="CLOUD WARS">CLOUD WARS</div>
          <div class="subtitle">{{option_a}} vs {{option_b}} — CAST YOUR VOTE</div>
          <div class="pulse-line"></div>
          <div class="nav-actions">
            <a href="/" class="nav-action-btn nav-primary">VOTE</a>
            <a href="https://ai-fairy-result.duckdns.org" class="nav-action-btn nav-outlined" id="result-link">RESULT</a>
          </div>
        </div>

        <form id="choice" name='form' method="POST" action="/">
          <button id="a" type="submit" name="vote" class="vote-btn btn-a" value="a">
            <div class="btn-icon">
              <svg viewBox="0 0 100 100" class="cloud-icon">
                <text x="50" y="55" text-anchor="middle" dominant-baseline="middle" font-size="50">☁️</text>
              </svg>
            </div>
            <span class="btn-label">{{option_a}}</span>
            <div class="btn-glow"></div>
          </button>

          <div class="vs-badge">
            <span>VS</span>
          </div>

          <button id="b" type="submit" name="vote" class="vote-btn btn-b" value="b">
            <div class="btn-icon">
              <svg viewBox="0 0 100 100" class="cloud-icon">
                <text x="50" y="55" text-anchor="middle" dominant-baseline="middle" font-size="50">🌩️</text>
              </svg>
            </div>
            <span class="btn-label">{{option_b}}</span>
            <div class="btn-glow"></div>
          </button>
        </form>

        <div id="tip">
          <span class="blink">▶</span> TIP: You can change your vote anytime
        </div>

        <div id="hostname">
          <span class="label-dim">NODE:</span> {{hostname}}
        </div>
      </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    {% if vote %}
    <script>
      var vote = "{{vote}}";
      if(vote == "a"){
        $(".btn-a").addClass('selected');
        $(".btn-a .btn-label").append(' <span class="check">✓</span>');
        $(".btn-b").addClass('dimmed');
      }
      if(vote == "b"){
        $(".btn-b").addClass('selected');
        $(".btn-b .btn-label").append(' <span class="check">✓</span>');
        $(".btn-a").addClass('dimmed');
      }
    </script>
    {% endif %}
  </body>
</html>
