apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
  namespace: monitoring
  labels:
    app: grafana
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: "default"
        orgId: 1
        folder: "Cloud Wars"
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards
          foldersFromFilesStructure: false
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: monitoring
  labels:
    app: grafana
data:
  cloud-wars-overview.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "links": [],
      "panels": [
        {
          "title": "Pod Status (chinmayee namespace)",
          "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 0, "y": 0 },
          "targets": [
            {
              "expr": "count(kube_pod_status_phase{namespace=\"chinmayee\", phase=\"Running\"} == 1)",
              "legendFormat": "Running"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "steps": [
                  { "color": "red", "value": 0 },
                  { "color": "yellow", "value": 3 },
                  { "color": "green", "value": 5 }
                ]
              },
              "unit": "none"
            }
          }
        },
        {
          "title": "Pod Restarts",
          "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 6, "y": 0 },
          "targets": [
            {
              "expr": "sum(kube_pod_container_status_restarts_total{namespace=\"chinmayee\"})",
              "legendFormat": "Total Restarts"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "steps": [
                  { "color": "green", "value": 0 },
                  { "color": "yellow", "value": 5 },
                  { "color": "red", "value": 10 }
                ]
              }
            }
          }
        },
        {
          "title": "CPU Usage by Pod",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 4 },
          "targets": [
            {
              "expr": "sum(rate(container_cpu_usage_seconds_total{namespace=\"chinmayee\", container!=\"\"}[5m])) by (pod)",
              "legendFormat": "{{pod}}"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "short" }
          }
        },
        {
          "title": "Memory Usage by Pod",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 4 },
          "targets": [
            {
              "expr": "sum(container_memory_working_set_bytes{namespace=\"chinmayee\", container!=\"\"}) by (pod)",
              "legendFormat": "{{pod}}"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "bytes" }
          }
        },
        {
          "title": "NGINX Ingress — Request Rate",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 12 },
          "targets": [
            {
              "expr": "sum(rate(nginx_ingress_controller_requests{namespace=\"chinmayee\"}[5m])) by (host)",
              "legendFormat": "{{host}}"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "reqps" }
          }
        },
        {
          "title": "NGINX Ingress — Error Rate (4xx/5xx)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 12 },
          "targets": [
            {
              "expr": "sum(rate(nginx_ingress_controller_requests{namespace=\"chinmayee\", status=~\"4..|5..\"}[5m])) by (status, host)",
              "legendFormat": "{{status}} — {{host}}"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "reqps" }
          }
        },
        {
          "title": "NGINX Ingress — Response Latency (p95)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 20 },
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum(rate(nginx_ingress_controller_request_duration_seconds_bucket{namespace=\"chinmayee\"}[5m])) by (le, host))",
              "legendFormat": "p95 — {{host}}"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "s" }
          }
        }
      ],
      "schemaVersion": 39,
      "tags": ["cloud-wars", "eks", "chinmayee"],
      "templating": { "list": [] },
      "time": { "from": "now-1h", "to": "now" },
      "title": "Cloud Wars — Voting App Overview",
      "uid": "cloud-wars-overview"
    }
  node-metrics.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "panels": [
        {
          "title": "Node CPU Usage",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "targets": [
            {
              "expr": "100 - (avg by(instance) (irate(node_cpu_seconds_total{mode=\"idle\"}[5m])) * 100)",
              "legendFormat": "{{instance}}"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "percent", "max": 100, "min": 0 }
          }
        },
        {
          "title": "Node Memory Usage",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "targets": [
            {
              "expr": "(1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100",
              "legendFormat": "{{instance}}"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "percent", "max": 100, "min": 0 }
          }
        },
        {
          "title": "Disk Usage",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "targets": [
            {
              "expr": "(1 - (node_filesystem_avail_bytes{mountpoint=\"/\"} / node_filesystem_size_bytes{mountpoint=\"/\"})) * 100",
              "legendFormat": "{{instance}}"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "percent", "max": 100, "min": 0 }
          }
        },
        {
          "title": "Network Traffic",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "targets": [
            {
              "expr": "sum(rate(node_network_receive_bytes_total{device!=\"lo\"}[5m])) by (instance)",
              "legendFormat": "RX — {{instance}}"
            },
            {
              "expr": "sum(rate(node_network_transmit_bytes_total{device!=\"lo\"}[5m])) by (instance)",
              "legendFormat": "TX — {{instance}}"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "Bps" }
          }
        }
      ],
      "schemaVersion": 39,
      "tags": ["nodes", "eks"],
      "time": { "from": "now-1h", "to": "now" },
      "title": "EKS Node Metrics",
      "uid": "node-metrics"
    }
